<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FLUX.2 Pro Image Generator</title>
<style>
body{
    font-family:Arial;
    max-width:700px;
    margin:40px auto;
}
textarea{
    width:100%;
    height:120px;
}
button{
    margin-top:10px;
    padding:10px 20px;
}
img{
    max-width:100%;
    margin-top:20px;
}
pre{
    background:#111;
    color:#0f0;
    padding:10px;
    overflow:auto;
}
</style>
</head>
<body>

<h1>FLUX.2 Pro</h1>

<textarea id="prompt" placeholder="Describe an image..."></textarea>
<br>
<button onclick="generateImage()">Generate</button>

<h3 id="status"></h3>

<div id="result"></div>

<pre id="error"></pre>

<script>
const API_KEY = "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";

async function generateImage() {

    const prompt = document.getElementById("prompt").value;
    const status = document.getElementById("status");
    const result = document.getElementById("result");
    const errorBox = document.getElementById("error");

    status.innerText = "Generating...";
    result.innerHTML = "";
    errorBox.textContent = "";

    try {

        const response = await fetch(
            "https://openrouter.ai/api/v1/chat/completions",
            {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "black-forest-labs/flux.2-pro",
                    modalities: ["image"], // IMPORTANT
                    messages: [
                        {
                            role: "user",
                            content: prompt
                        }
                    ]
                })
            }
        );

        const data = await response.json();

        console.log("HTTP status:", response.status);
        console.log(data);

        if (!response.ok) {
            throw new Error(
                `HTTP ${response.status}\n\n${JSON.stringify(data, null, 2)}`
            );
        }

        if (
            !data.choices ||
            !data.choices[0].message.images
        ) {
            throw new Error(
                "No image returned.\n\n" +
                JSON.stringify(data, null, 2)
            );
        }

        const imageUrl =
            data.choices[0].message.images[0].image_url.url;

        result.innerHTML = `<img src="${imageUrl}">`;

        status.innerText = "Done.";

    } catch (err) {

        console.error(err);

        status.innerText = "Error";

        errorBox.textContent =
            err.message || JSON.stringify(err, null, 2);

    }
}
</script>

</body>
</html>

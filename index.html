<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nano Banana Image Generator</title>
<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 700px;
        margin: 40px auto;
        padding: 20px;
    }

    textarea {
        width: 100%;
        height: 120px;
        padding: 10px;
        font-size: 16px;
    }

    button {
        margin-top: 15px;
        padding: 12px 20px;
        font-size: 16px;
        cursor: pointer;
    }

    #result {
        margin-top: 30px;
    }

    img {
        max-width: 100%;
        border-radius: 10px;
    }
</style>
</head>
<body>

<h1>Nano Banana Image Generator</h1>

<textarea id="prompt"
placeholder="Describe the image you want..."></textarea>

<br>

<button onclick="generateImage()">Generate</button>

<div id="status"></div>

<div id="result"></div>

<script>
const API_KEY = "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";

async function generateImage() {
    const prompt = document.getElementById("prompt").value;
    const status = document.getElementById("status");
    const result = document.getElementById("result");

    status.innerText = "Generating...";
    result.innerHTML = "";

    try {
        const response = await fetch(
            "https://openrouter.ai/api/v1/chat/completions",
            {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "black-forest-labs/flux.2-pro",
                    modalities: ["text", "image"],
                    messages: [
                        {
                            role: "user",
                            content: prompt
                        }
                    ]
                })
            }
        );

        const data = await response.json();

        console.log(data);

        const imageUrl =
            data.choices[0].message.images[0].image_url.url;

        result.innerHTML = `<img src="${imageUrl}">`;

        status.innerText = "Done!";
    }
    catch (err) {
        console.error(err);
        status.innerText = "Error generating image.";
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Image Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,sans-serif;
    background:#0f172a;
    color:white;
    min-height:100vh;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

.header{
    margin-top:20px;
    margin-bottom:30px;
}

.header h1{
    font-size:2rem;
    font-weight:700;
}

.header p{
    margin-top:8px;
    color:#94a3b8;
    font-size:.95rem;
}

.card{
    background:#1e293b;
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:18px;
}

textarea{
    width:100%;
    min-height:130px;
    resize:none;
    border:none;
    outline:none;
    background:#334155;
    color:white;
    border-radius:18px;
    padding:18px;
    font-size:15px;
}

textarea::placeholder{
    color:#94a3b8;
}

.generate{
    width:100%;
    margin-top:18px;
    border:none;
    border-radius:18px;
    padding:18px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    color:white;
    background:linear-gradient(135deg,#7c3aed,#2563eb);
    transition:.2s;
}

.generate:active{
    transform:scale(.98);
}

#status{
    margin-top:20px;
    text-align:center;
    color:#94a3b8;
}

.preview{
    margin-top:24px;
}

.preview img{
    width:100%;
    border-radius:24px;
    display:block;
}

.error{
    margin-top:18px;
    background:#3b0d0d;
    color:#ffb4b4;
    padding:16px;
    border-radius:18px;
    font-size:13px;
    white-space:pre-wrap;
    overflow:auto;
}

.loading{
    width:55px;
    height:55px;
    border:4px solid rgba(255,255,255,.15);
    border-top:4px solid white;
    border-radius:50%;
    margin:20px auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>✨ AI Image Generator</h1>
        <p>Create beautiful images with OpenRouter</p>
    </div>

    <div class="card">

        <textarea
            id="prompt"
            placeholder="Describe your image...
Example: A futuristic Tokyo street at night with neon lights">
        </textarea>

        <button class="generate" onclick="generateImage()">
            Generate Image
        </button>

        <div id="status"></div>

        <div class="preview" id="preview"></div>

        <div class="error" id="error" style="display:none"></div>

    </div>

</div>

<script>

const API_KEY = "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";

async function generateImage(){

    const prompt = document.getElementById("prompt").value;
    const preview = document.getElementById("preview");
    const errorBox = document.getElementById("error");
    const status = document.getElementById("status");

    preview.innerHTML = "";
    errorBox.style.display = "none";

    status.innerHTML = `
        <div class="loading"></div>
        Generating image...
    `;

    try{

        const response = await fetch(
            "https://openrouter.ai/api/v1/chat/completions",
            {
                method:"POST",
                headers:{
                    "Authorization":`Bearer ${API_KEY}`,
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    model:"google/gemini-3.1-flash-image-preview",
                    modalities:["image"],
                    messages:[
                        {
                            role:"user",
                            content:prompt
                        }
                    ]
                })
            }
        );

        const data = await response.json();

        console.log(data);

        if(!response.ok){
            throw new Error(JSON.stringify(data,null,2));
        }

        const imageUrl =
            data.choices[0].message.images[0].image_url.url;

        preview.innerHTML = `
            <img src="${imageUrl}">
        `;

        status.innerHTML = "✅ Done";

    }
    catch(err){

        status.innerHTML = "❌ Failed";

        errorBox.style.display = "block";

        errorBox.textContent = err.message;

        console.error(err);

    }

}

</script>

</body>
</html>
